# Aegis 2.0 — Tool Registry Configuration
# 所有外部数据源 Tool 在此注册
# 新增 Tool 必须包含: name / class / category / tags / fallback / circuit_breaker / rate_limit / bound_agents

categories:
  - market_data
  - macro
  - sentiment
  - flows
  - liquidity
  - options_chain
  - broker

tools:
  - name: yfinance
    class: aegis.tools.market.yfinance_adapter.YFinanceAdapter
    category: market_data
    tags: [ohlcv, quote, earnings_date, options_chain, fundamentals]
    rate_limit:
      max_calls: 5
      period: 60
    circuit_breaker:
      failure_threshold: 3
      recovery_timeout: 120
    fallback: alpha_vantage
    bound_agents: [data_harvester, trend_phase_analyst, level_analyst]

  - name: alpha_vantage
    class: aegis.tools.market.alpha_vantage_adapter.AlphaVantageAdapter
    category: market_data
    tags: [ohlcv, quote, earnings_date, company_overview]
    rate_limit:
      max_calls: 5
      period: 60
    circuit_breaker:
      failure_threshold: 3
      recovery_timeout: 120
    fallback: null
    bound_agents: [data_harvester, fundamental_analyst]

  - name: fred
    class: aegis.tools.macro.fred_adapter.FREDAdapter
    category: macro
    tags: [macro, interest_rate, inflation, employment]
    rate_limit:
      max_calls: 10
      period: 60
    circuit_breaker:
      failure_threshold: 3
      recovery_timeout: 120
    fallback: null
    bound_agents: [macro_analyst]

  - name: tavily
    class: aegis.tools.news.tavily_adapter.TavilyAdapter
    category: sentiment
    tags: [news, sentiment, search]
    rate_limit:
      max_calls: 5
      period: 60
    circuit_breaker:
      failure_threshold: 3
      recovery_timeout: 120
    fallback: null
    bound_agents: [sentiment_analyst, news_analyst]

