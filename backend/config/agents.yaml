# Aegis 2.0 — Agent Manifest Configuration
# 每个 Agent 的注册信息在此声明
# 新增 Agent 必须包含: name / version / requires / provides / tags / llm_dependency / parallel_group / pipeline_mode / enabled

agents:
  data_harvester:
    name: data_harvester
    version: "0.1.0"
    requires: []
    provides: [market_data, macro_data]
    tags: [data, harvester]
    llm_dependency: false
    parallel_group: null
    pipeline_mode: both
    enabled: true

  portfolio_orchestrator:
    name: portfolio_orchestrator
    version: "0.1.0"
    requires: []
    provides: [tickers_holdings_active, tickers_holdings_passive, entry_mode, health_scores, positions]
    tags: [portfolio, orchestrator]
    llm_dependency: false
    parallel_group: null
    pipeline_mode: both
    enabled: true

  trend_phase_analyst:
    name: trend_phase_analyst
    version: "0.1.0"
    requires: [market_data]
    provides: [analyst_outputs.trend_phase, extensions.trend_phase_analyst]
    tags: [trend, phase, signal]
    llm_dependency: false
    parallel_group: signal_analysts
    pipeline_mode: both
    enabled: true

  level_analyst:
    name: level_analyst
    version: "0.1.0"
    requires: [market_data]
    provides: [analyst_outputs.levels, extensions.level_analyst]
    tags: [levels, support, resistance, signal]
    llm_dependency: false
    parallel_group: signal_analysts
    pipeline_mode: both
    enabled: true

  options_strategist_s1:
    name: options_strategist_s1
    version: "0.1.0"
    requires: [market_data]
    provides: [options_step1, extensions.options_strategist_s1]
    tags: [options, screening, signal]
    llm_dependency: false
    parallel_group: signal_analysts
    pipeline_mode: full
    enabled: true

  options_strategist_s2:
    name: options_strategist_s2
    version: "0.1.0"
    requires: [options_step1, debate_results, analyst_outputs.levels]
    provides: [options_step2, extensions.options_strategist_s2]
    tags: [options, strategy, signal]
    llm_dependency: true
    parallel_group: null
    pipeline_mode: full
    enabled: true

  research_manager:
    name: research_manager
    version: "0.1.0"
    requires: [options_step2, debate_results, positions]
    provides: [recommendations, pending_triggers, extensions.research_manager]
    tags: [research, ranking, synthesis]
    llm_dependency: true
    parallel_group: null
    pipeline_mode: full
    enabled: true

  debate_agent:
    name: debate_agent
    version: "0.1.0"
    requires: [analyst_outputs]
    provides: [debate_results, extensions.debate_agent]
    tags: [debate, bull, bear, judge]
    llm_dependency: true
    parallel_group: null
    pipeline_mode: full
    enabled: true

  risk_gate:
    name: risk_gate
    version: "0.1.0"
    requires: [recommendations, positions, market_data, macro_data]
    provides: [recommendations, blocked_recommendations, extensions.risk_gate]
    tags: [risk, gate, safety]
    llm_dependency: false
    parallel_group: null
    pipeline_mode: full
    enabled: true
