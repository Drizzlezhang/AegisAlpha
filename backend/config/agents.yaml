# Aegis 2.0 — Agent Manifest Configuration
# 每个 Agent 的注册信息在此声明
# 新增 Agent 必须包含: name / version / requires / provides / tags / llm_dependency / parallel_group / pipeline_mode / enabled

agents:
  data_harvester:
    name: data_harvester
    version: "0.1.0"
    requires: []
    provides: [market_data, macro_data]
    tags: [data, harvester]
    llm_dependency: false
    parallel_group: null
    pipeline_mode: both
    enabled: true

  portfolio_orchestrator:
    name: portfolio_orchestrator
    version: "0.1.0"
    requires: []
    provides: [tickers_holdings_active, tickers_holdings_passive, entry_mode, health_scores, positions]
    tags: [portfolio, orchestrator]
    llm_dependency: false
    parallel_group: null
    pipeline_mode: both
    enabled: true
